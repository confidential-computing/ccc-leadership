name: Generate and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - 'ccc-leadership/**'
      - 'generate-static-html.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Validate JSON
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          
          json_path = 'ccc-leadership/leadership.json'
          photos_dir = 'ccc-leadership/leadership-photos'
          
          with open(json_path, 'r', encoding='utf-8') as f:
              data = json.load(f)
          
          # Check required fields
          required_fields = ['id', 'name', 'role', 'organization', 'title', 'category', 'avatar', 'bio']
          errors = []
          for idx, person in enumerate(data):
              for field in required_fields:
                  if field not in person:
                      errors.append(f"Person {idx + 1} ({person.get('name', 'Unknown')}): Missing '{field}'")
          
          if errors:
              print("❌ Validation errors:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          
          # Check photos
          missing = []
          for person in data:
              avatar = person.get('avatar', '')
              if avatar.startswith('./leadership-photos/'):
                  filename = avatar.replace('./leadership-photos/', '')
                  if not os.path.exists(os.path.join(photos_dir, filename)):
                      missing.append(f"{person.get('name')}: {filename}")
          
          if missing:
              print("❌ Missing photos:")
              for m in missing:
                  print(f"  - {m}")
              sys.exit(1)
          
          print(f"✅ Validation passed: {len(data)} entries, all photos present")
          EOF

      - name: Generate static HTML
        run: |
          python3 generate-static-html.py

      - name: Copy photos to docs directory
        run: |
          mkdir -p docs/ccc-leadership/leadership-photos
          cp -r ccc-leadership/leadership-photos/* docs/ccc-leadership/leadership-photos/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

